<!DOCTYPE html>
<html lang="en">
<head>

    <py-config>
        packages = ["numpy"]

    <style>
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; margin: 0; }

            display: grid; 
            grid-template-columns: repeat(4, 1fr);

        .photo-card img { width: 100%; height: 200px; object-fit: cover; }
        .caption-box { padding: 15px; }
        .caption-title { font-weight: bold; color: #333; margin-bottom: 5px; }
        .caption-text { color: #666; font-size: 14px; }
    </style>
