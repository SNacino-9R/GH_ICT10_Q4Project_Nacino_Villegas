<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>
    <style>
        body { 
            background-color: blue; 
            color: white; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
        }
        .container { max-width: 600px; }
        input, select { color: black; margin: 5px 0; padding: 5px; width: 100%; }
        button { 
            background-color: red; 
            color: white; 
            border: none; 
            padding: 10px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold;
            margin-top: 10px;
        }
        #plot-target { background-color: white; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Attendance Tracker</h2>
        
        <label>Select Day:</label>
        <select id="day-select">
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
        </select>

        <label>Number of Absences:</label>
        <input type="number" id="absence-input">

        <button id="submit-btn" py-click="update_graph">Submit</button>

        <div id="plot-target"></div>
    </div>

    <script type="py" src="main.py"></script>
</body>
</html>
